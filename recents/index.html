<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site not found · GitHub Pages</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="topbar">
  <div class="left">
    <div class="logo">CARSON SMP GAMES</div>

    <div class="nav">
      <a href="/games/">HOME</a>
      <a href="/games/recents/">RECENTS</a>
      <a href="/games/updates/">UPDATES</a>
    </div>
  </div>
</div>

<div class="section-title">Recently Played</div>

<div class="grid" id="recentsGrid"></div>

<script>

let recents = JSON.parse(localStorage.getItem("recentGames")) || [];
recents = recents.slice(-12).reverse();

const grid = document.getElementById("recentsGrid");

if (recents.length === 0) {
  grid.innerHTML = "<div style='padding:20px; opacity:0.7;'>No recent games yet.</div>";
} else {
  recents.forEach(game => {

    const a = document.createElement("a");
    a.className = "game";

    // FORCE ROOT PATHS
    const link = game.link.startsWith("/") ? game.link : "/games/" + game.link;
    const img = game.img.startsWith("/") ? game.img : "/games/" + game.img;

    a.href = link;

    a.innerHTML = `
      <img src="${img}">
      <div>${game.name}</div>
    `;

    grid.appendChild(a);
  });
}

</script>

</body>
</html>
